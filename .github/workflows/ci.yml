name: AutoGuard OTA CI Pipeline

# Trigger this pipeline on every push or pull request to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Run E2E Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install C++ & gRPC System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libgrpc++-dev protobuf-compiler-grpc protobuf-compiler libprotobuf-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r server/requirements.txt

    - name: Generate Ephemeral TLS and RSA Keys
      run: |
        mkdir -p keys
        
        # 1. Generate TLS Certificates for gRPC connection
        openssl req -x509 -newkey rsa:4096 -nodes -days 365 \
          -keyout keys/server.key \
          -out keys/server.crt \
          -subj "/CN=localhost"
          
        # 2. Generate RSA Keypair for Firmware Signing
        openssl genrsa -out keys/private.pem 2048
        openssl rsa -in keys/private.pem -outform PEM -pubout -out keys/public.pem

    - name: Compile C++ Edge Client
      run: |
        echo "--- WHAT FILES ARE ON THIS SERVER? ---"
        ls -la
        echo "--- ENTERING CLIENT DIRECTORY ---"
        cd client
        mkdir -p build
        cd build
        echo "--- RUNNING CMAKE ---"
        cmake -DCMAKE_PREFIX_PATH=/usr ..
        echo "--- COMPILING ---"
        make

    - name: Run Integration Tests
      run: |
        # 1. Start the FastAPI Admin Dashboard in the background
        cd server/src
        uvicorn admin_api:app --port 8000 &
        cd ../..
        
        # 2. Start the gRPC OTA Engine in the background
        python3 -u server/src/server.py &
        
        # Give the servers 3 seconds to fully boot up and bind to ports
        sleep 3
        
        # 3. Run the automated QA suite
        pytest server/tests/test_e2e.py -v -s
